<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智己汽车 - 试驾邀约会话路径概率图POC</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 登录页 -->
    <div id="login-page" class="page active">
        <div class="login-container">
            <div class="login-brand">
                <div class="logo">智己汽车</div>
                <h2>试驾邀约会话路径概率图POC</h2>
                <p>基于成功案例路径概率图的新人销售实时引导系统</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="login-account" placeholder="请输入账号" value="demo">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" value="demo">
                </div>
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" checked> 记住密码
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>
                <button class="btn btn-primary btn-block" onclick="login()">登录</button>
            </div>
            <div class="login-footer"><p>智己汽车试驾邀约POC产品 ©2026</p></div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="app" class="page">
        <header class="top-nav">
            <div class="nav-brand"><span class="mini-logo">智己</span><span class="nav-title">试驾邀约路径概率图</span></div>
            <nav class="nav-tabs">
                <a href="#" class="nav-tab active" data-page="dashboard">首页</a>
                <a href="#" class="nav-tab" data-page="case-import">案例拆解</a>
                <a href="#" class="nav-tab" data-page="graph">路径图谱</a>
                <a href="#" class="nav-tab" data-page="guide">实时引导</a>
                <a href="#" class="nav-tab" data-page="report">数据报表</a>
            </nav>
            <div class="nav-actions"><span class="sync-status">数据已同步</span></div>
        </header>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Stage-Topic 导航</h3>
                <div class="stage-tree"></div>
            </div>
            <div class="sidebar-section">
                <h3>路径类型说明</h3>
                <div class="legend-item"><div class="legend-line forward"></div><span>正向迁移 (A/B/C)</span></div>
                <div class="legend-item"><div class="legend-line backward"></div><span>逆向跳转 (D)</span></div>
            </div>
        </aside>

        <main class="main-content">
            <!-- 首页 -->
            <div id="page-dashboard" class="content-page active">
                <h1>仪表盘</h1>
            </div>

            <!-- 案例拆解 -->
            <div id="page-case-import" class="content-page">
                <h1>案例拆解</h1>
                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" accept=".csv,.xlsx" style="display:none;" onchange="handleFileUpload(this)">
                    <p>点击上传案例文件 (CSV/Excel)</p>
                </div>
                <div id="upload-result"></div>
            </div>

            <!-- 路径图谱 -->
            <div id="page-graph" class="content-page">
                <h1>路径概率图谱</h1>
                <div id="graph-container"></div>
            </div>

            <!-- 实时引导 -->
            <div id="page-guide" class="content-page">
                <h1>新人销售实时引导</h1>
                <div class="guide-container">
                    <div class="guide-input-section">
                        <h3>客户语音转文字</h3>
                        <textarea id="customer-input" class="guide-input" placeholder="请输入客户说的话，或点击[模拟输入]...">
我已经试驾过其他品牌了，你们智己的车价格有点贵，续航也不知道怎么样。</textarea>
                        <div class="guide-actions">
                            <button class="btn btn-primary" onclick="analyzeAndRecommend()">获取推荐话术</button>
                            <button class="btn btn-secondary" onclick="simulateCustomerInput()">模拟输入</button>
                        </div>
                    </div>
                    
                    <div id="recommendation-result" class="recommendation-section" style="display:none;">
                        <h3>AI推荐话术</h3>
                        <div class="recommendation-card">
                            <div class="rec-header">
                                <span class="rec-topic-flow"></span>
                                <span class="rec-confidence"></span>
                            </div>
                            <div class="rec-act"></div>
                            <div class="rec-script"></div>
                            <div class="rec-reason"></div>
                            <div class="rec-path"></div>
                        </div>
                        <div class="rec-alternatives"></div>
                        <button class="btn btn-secondary" onclick="copyScript()">复制话术</button>
                    </div>
                    
                    <div class="guide-history">
                        <h3>对话历史</h3>
                        <div id="conversation-history" class="history-list"></div>
                    </div>
                </div>
            </div>

            <!-- 数据报表 -->
            <div id="page-report" class="content-page">
                <h1>数据报表</h1>
            </div>
        </main>
    </div>

    <script src="js/gbk_decoder.js?v=202504011630"></script>
    <script src="js/recommendation_engine_v5.js?v=202504011630"></script>
    <script src="js/app.js?v=202504011630"></script>
</body>
</html>
